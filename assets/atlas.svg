<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F4EC"/>
      <stop offset="100%" stop-color="#E7DED0"/>
    </linearGradient>
    <style>
      .title { font-family: "Geist", "Satoshi", "Avenir Next", sans-serif; font-weight: 700; letter-spacing: -0.8px; }
      .mono { font-family: "Geist Mono", "SFMono-Regular", Consolas, monospace; font-weight: 600; letter-spacing: 1px; }
      .body { font-family: "Geist", "Satoshi", "Avenir Next", sans-serif; font-weight: 400; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="30" fill="url(#paper)"/>
  <rect x="28" y="28" width="1144" height="704" rx="22" fill="none" stroke="#18181B" stroke-opacity="0.12"/>

  <text class="mono" x="72" y="78" fill="#7A6139" font-size="13">PUBLIC WORK INDEX / WEEKLY METADATA SNAPSHOT</text>
  <text class="title" x="72" y="124" fill="#18181B" font-size="42">170 public repositories across six operating fields.</text>
  <text class="body" x="72" y="158" fill="#52525B" font-size="18">A weekly metadata snapshot folded into a static field index.</text>
  <rect x="72" y="198" width="1056" height="1" fill="#18181B" fill-opacity="0.16"/>

    <g transform="translate(0 240)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">VENTURE OPS</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Taste, planning, execution, and review are treated as one operating loop.</text>
      <rect x="640" y="-16" width="152" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="808" y="-16" width="102" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">12 repos</text>
    </g>
    <g transform="translate(0 322)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">REFLECTION</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Symbolic and contemplative systems are implemented as inspectable runtimes.</text>
      <rect x="640" y="-16" width="157" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="813" y="-16" width="84" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">14 repos</text>
    </g>
    <g transform="translate(0 404)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">SPATIAL</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Place, panorama, and property experiences carry their own operational backplanes.</text>
      <rect x="640" y="-16" width="149" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="805" y="-16" width="84" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">11 repos</text>
    </g>
    <g transform="translate(0 486)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">TRUST</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Consent, verification, cultural context, and onboarding are part of product architecture.</text>
      <rect x="640" y="-16" width="154" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="810" y="-16" width="102" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">13 repos</text>
    </g>
    <g transform="translate(0 568)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">NARRATIVE</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Story, research, media, and ritual are structured as navigable systems.</text>
      <rect x="640" y="-16" width="175" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="831" y="-16" width="138" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">21 repos</text>
    </g>
    <g transform="translate(0 650)">
      <text class="mono" x="72" y="0" fill="#18181B" font-size="13">TOOLS</text>
      <text class="body" x="72" y="28" fill="#52525B" font-size="15">Expert workflows become portable tools without flattening the expert practice.</text>
      <rect x="640" y="-16" width="380" height="12" rx="6" fill="#18181B" fill-opacity="0.62"/>
      <rect x="1036" y="-16" width="138" height="12" rx="6" fill="#B08D57" fill-opacity="0.66"/>
      <text class="mono" x="620" y="-5" fill="#7A6139" font-size="12" text-anchor="end">99 repos</text>
    </g>
</svg>
