<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="field" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0C0B"/>
      <stop offset="58%" stop-color="#141412"/>
      <stop offset="100%" stop-color="#23211D"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <style>
      .title { font-family: "Geist", "Satoshi", "Avenir Next", sans-serif; font-weight: 700; letter-spacing: -0.8px; }
      .mono { font-family: "Geist Mono", "SFMono-Regular", Consolas, monospace; font-weight: 600; letter-spacing: 1px; }
      .body { font-family: "Geist", "Satoshi", "Avenir Next", sans-serif; font-weight: 400; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="30" fill="url(#field)"/>
  <rect width="1200" height="760" rx="30" filter="url(#grain)" opacity="0.42"/>
  <rect x="28" y="28" width="1144" height="704" rx="22" fill="none" stroke="#E1E0CC" stroke-opacity="0.12"/>

  <text class="mono" x="72" y="78" fill="#DEDBC8" font-size="13">PUBLIC WORK INDEX / SIX OPERATING FIELDS</text>
  <text class="title" x="72" y="124" fill="#E1E0CC" font-size="42">170 public repositories across six operating fields.</text>
  <text class="body" x="72" y="158" fill="#A9A797" font-size="18">A living map of rooms, tools, runtimes, archives, and trust surfaces.</text>
  <rect x="72" y="198" width="1056" height="1" fill="#E1E0CC" fill-opacity="0.16"/>

    <g transform="translate(0 240)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">VENTURE OPS</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Taste, planning, execution, and review stay in the same loop.</text>
      <rect x="640" y="-16" width="152" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="808" y="-16" width="72" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">12 repos</text>
    </g>
    <g transform="translate(0 322)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">REFLECTION</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Symbolic work is kept runnable, inspectable, and grounded in code.</text>
      <rect x="640" y="-16" width="157" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="813" y="-16" width="58" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">14 repos</text>
    </g>
    <g transform="translate(0 404)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">SPATIAL</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Place is treated as interface: mapped, navigable, and operational.</text>
      <rect x="640" y="-16" width="149" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="805" y="-16" width="100" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">11 repos</text>
    </g>
    <g transform="translate(0 486)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">TRUST</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Trust surfaces carry consent, verification, and cultural context.</text>
      <rect x="640" y="-16" width="154" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="810" y="-16" width="58" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">13 repos</text>
    </g>
    <g transform="translate(0 568)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">NARRATIVE</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Archives hold story, research, media, and ritual without flattening them.</text>
      <rect x="640" y="-16" width="175" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="831" y="-16" width="86" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">21 repos</text>
    </g>
    <g transform="translate(0 650)">
      <text class="mono" x="72" y="0" fill="#E1E0CC" font-size="13">TOOLS</text>
      <text class="body" x="72" y="28" fill="#A9A797" font-size="15">Expert workflows become portable without shaving off the practice.</text>
      <rect x="640" y="-16" width="380" height="12" rx="6" fill="#E1E0CC" fill-opacity="0.44"/>
      <rect x="1036" y="-16" width="86" height="12" rx="6" fill="#DEDBC8" fill-opacity="0.82"/>
      <text class="mono" x="620" y="-5" fill="#DEDBC8" font-size="12" text-anchor="end">99 repos</text>
    </g>
</svg>
