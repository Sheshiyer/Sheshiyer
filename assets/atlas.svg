  <rect width="1200" height="760" rx="30" fill="url(#paper)"/>
  <rect x="28" y="28" width="1144" height="704" rx="22" fill="none" stroke="#18181B" stroke-opacity="0.12"/>

  <text class="mono" x="72" y="78" fill="#7A6139" font-size="13">PUBLIC WORK INDEX</text>
  <text class="title" x="72" y="124" fill="#18181B" font-size="42">170 public repositories across six operating fields.</text>
  <text class="body" x="72" y="158" fill="#52525B" font-size="18">The pattern is visible in the repeated joins: brand to runtime, runtime to interface, interface to archive.</text>

